name: Deploy project page to GitHub Pages

# Publishes the static site in site/ to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment →
#   Source: "GitHub Actions". After that, every push to main that touches
# site/ redeploys; you can also run it manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
